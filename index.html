<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PH Job Tracker</title>
    <!-- Link External CSS File -->
    <link rel="stylesheet" href="style.css" />
    <!-- Link Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Inter Font CDN Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome CDN Link -->
    <script
      src="https://kit.fontawesome.com/27daea0603.js"
      crossorigin="anonymous"
    ></script>
    <style type="text/tailwindcss">
      @theme {
        --color-greenColor: #10b981;
        --color-redColor: #ef4444;
        --color-blackColor: #002c5c;
        --color-grayColor: #64748b;
        --color-darkGrayColor: #323b49;
        --color-blueColor: #3b82f6;
        --color-bgColor: #f8fafc;

        --font-Inter: Inter;
      }
    </style>
  </head>
  <body class="w-11/12 lg:w-5/6 2xl:w-9/10 mx-auto my-5 bg-bgColor font-Inter">
    <header>
      <h1 class="font-bold text-2xl lg:text-3xl xl:text-4xl text-blackColor">
        Job Application Tracker
      </h1>
      <!-- Count Section Container -->
      <div class="flex justify-between items-center gap-6 text-center">
        <!-- Total -->
        <div
          class="w-full bg-white p-5 shadow-md rounded-lg mt-6 space-y-1 border border-[#E6E7E9]"
        >
          <h6 class="text-lg font-medium">Total</h6>
          <p class="text-2xl text-blackColor font-extrabold pl-2">8</p>
        </div>

        <!-- Interview -->
        <div
          class="w-full bg-white p-5 shadow-md rounded-lg mt-6 space-y-1 border border-[#E6E7E9]"
        >
          <h6 class="text-lg font-medium">Interview</h6>
          <p class="text-2xl text-greenColor font-extrabold pl-2">0</p>
        </div>
        <!-- Rejected -->
        <div
          class="w-full bg-white p-5 shadow-md rounded-lg mt-6 space-y-1 border border-[#E6E7E9]"
        >
          <h6 class="text-lg font-medium">Rejected</h6>
          <p class="text-2xl text-redColor font-extrabold pl-2">0</p>
        </div>
      </div>
      <hr class="text-[#d2d2d2] my-6" />
    </header>
    <main>
      <nav class="space-y-3">
        <div class="flex justify-between items-center">
          <h3 class="text-xl font-semibold text-blackColor">Available Jobs</h3>
          <p class="text-grayColor font-medium">
            <span id="available-job-count">8</span>
            <span id="available-interview-count" class="hidden">1</span>
            <span id="available-rejected-count" class="hidden">2</span>
            jobs
          </p>
        </div>
        <!-- nav menu button container -->
        <div id="nav-button-container">
          <button
            id="nav-btn-one"
            class="nav-btn bg-blueColor text-white px-10 py-1.5 rounded-sm mr-3 cursor-pointer border border-[#d5d6da]"
          >
            All
          </button>
          <button
            id="nav-btn-two"
            class="nav-btn bg-white px-10 py-1.5 text-darkGrayColor rounded-sm mr-3 cursor-pointer border border-[#d5d6da]"
          >
            Interview
          </button>
          <button
            id="nav-btn-three"
            class="nav-btn bg-white px-10 py-1.5 text-darkGrayColor rounded-sm cursor-pointer border border-[#d5d6da]"
          >
            Rejected
          </button>
        </div>
      </nav>

    </main>
    <script src="./utils.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
